<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Page Not Found | Cinemmer</title>
  <meta name="description" content="The page you are looking for could not be found." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon.png">
  <link rel="icon" href="/favicon.ico" sizes="32x32">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0b;
      --surface: #111114;
      --border: rgba(255,255,255,0.07);
      --amber: #f0a500;
      --text: #e8e6e0;
      --text-muted: #7a7870;
      --text-dim: #4a4845;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
      --font-body: 'DM Sans', sans-serif;
      --radius: 4px;
      --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.6;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── NOISE OVERLAY ─── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.6;
    }

    /* ─── AMBIENT GLOW ─── */
    .ambient {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    .ambient-1 {
      width: 600px; height: 400px;
      top: -100px; left: -100px;
      background: radial-gradient(ellipse, rgba(240,165,0,0.06) 0%, transparent 70%);
    }
    .ambient-2 {
      width: 500px; height: 500px;
      bottom: 20vh; right: -150px;
      background: radial-gradient(ellipse, rgba(100,120,200,0.04) 0%, transparent 70%);
    }

    /* ─── NAV ─── */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 48px;
      height: 64px;
      background: rgba(10,10,11,0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: var(--font-mono);
      font-size: 0.9rem;
      color: var(--amber);
      text-decoration: none;
      letter-spacing: -0.02em;
      padding-top: 5px;
    }

    .nav-links { display: flex; align-items: center; gap: 36px; list-style: none; }
    .nav-links a {
      font-family: var(--font-mono); font-size: 0.78rem;
      color: var(--text-muted); text-decoration: none;
      letter-spacing: 0.08em; text-transform: uppercase;
      transition: color var(--transition);
    }
    .nav-links a:hover { color: var(--text); }

    /* ─── HERO (Adjusted for 404) ─── */
    #hero {
      position: relative;
      flex: 1;
      display: flex; flex-direction: column; justify-content: center;
      padding: 120px 48px 80px;
      z-index: 1;
    }

    .hero-tag {
      font-family: var(--font-mono); font-size: 0.75rem;
      color: var(--amber); letter-spacing: 0.12em;
      text-transform: uppercase; margin-bottom: 24px;
      display: flex; align-items: center; gap: 12px;
      opacity: 0; animation: fadeUp 0.7s 0.2s forwards;
    }
    .hero-tag::before {
      content: ''; width: 32px; height: 1px; background: var(--amber);
    }

    .hero-headline {
      font-family: var(--font-display);
      font-size: clamp(3rem, 8vw, 7.5rem); font-weight: 800;
      line-height: 0.92; letter-spacing: -0.03em;
      margin-bottom: 36px; max-width: 900px;
      opacity: 0; animation: fadeUp 0.8s 0.35s forwards;
    }
    .hero-headline em {
      font-style: normal; color: transparent;
      -webkit-text-stroke: 1px rgba(255,255,255,0.25);
    }

    .hero-sub {
      font-size: 1.05rem; color: var(--text-muted);
      max-width: 480px; line-height: 1.7; margin-bottom: 48px;
      opacity: 0; animation: fadeUp 0.8s 0.5s forwards;
    }

    .hero-actions {
      display: flex; flex-wrap: wrap; gap: 12px;
      opacity: 0; animation: fadeUp 0.8s 0.65s forwards;
    }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--font-mono); font-size: 0.78rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      text-decoration: none; padding: 12px 22px;
      border-radius: var(--radius); transition: all var(--transition);
      cursor: pointer; border: none;
    }
    .btn-primary { background: var(--amber); color: #000; font-weight: 600; }
    .btn-primary:hover { background: #f5b420; transform: translateY(-1px); }

    /* ─── FOOTER ─── */
    footer {
      border-top: 1px solid var(--border);
      padding: 28px 48px;
      display: flex; align-items: center; justify-content: space-between;
      position: relative; z-index: 1;
    }
    .footer-left {
      font-family: var(--font-mono); font-size: 0.72rem;
      color: var(--text-dim); letter-spacing: 0.06em;
    }
    .footer-left a { color: var(--text-dim); text-decoration: none; }
    .footer-right { display: flex; gap: 24px; }
    .footer-social {
      font-family: var(--font-mono); font-size: 0.72rem;
      color: var(--text-dim); text-decoration: none;
      letter-spacing: 0.06em; transition: color var(--transition);
    }
    .footer-social:hover { color: var(--text-muted); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 768px) {
      nav { padding: 0 20px; }
      .nav-links { display: none; }
      #hero, footer { padding-left: 20px; padding-right: 20px; }
    }
  </style>
</head>
<body>

<div class="ambient ambient-1"></div>
<div class="ambient ambient-2"></div>

<nav>
  <a href="/" class="nav-logo"><img src="/images/logo_transparent.png" width="125px" alt="Cinemmer Logo"></a>
  <ul class="nav-links">
    <li><a href="/#about">About</a></li>
    <li><a href="/#skills">Skills</a></li>
    <li><a href="/#projects">Projects</a></li>
    <li><a href="/#photography">Photography</a></li>
    <li><a href="/#contact">Contact</a></li>
  </ul>
</nav>

<section id="hero">
  <div class="hero-tag">Error 404</div>
  <h1 class="hero-headline">
    Off the<br/>
    <em>map.</em>
  </h1>
  <p class="hero-sub">
    The page you're looking for doesn't exist, has been moved, or is temporarily unavailable. 
  </p>
  <div class="hero-actions">
    <a href="/" class="btn btn-primary">Return Home</a>
  </div>
</section>

<footer>
  <div class="footer-left">
    © 2026 Cinemmer · Vienna, Austria ·
    <a href="mailto:contact@cinemmer.com">contact@cinemmer.com</a>
  </div>
  <div class="footer-right">
    <a href="https://github.com/fnburger/" target="_blank" class="footer-social">GitHub</a>
    <a href="https://www.instagram.com/cinemmer/" target="_blank" class="footer-social">Instagram</a>
    <a href="https://www.youtube.com/@cinemmer" target="_blank" class="footer-social">YouTube</a>
  </div>
</footer>

</body>
</html>
